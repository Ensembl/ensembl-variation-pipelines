name: CI checks
on: [pull_request]

permissions:
  contents: read
  pull-requests: read

env:
  ENSEMBL_ROOT_DIR: repos

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'src/python/**'
              - '.github/**'

  python:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.python == 'true'
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
        working-directory: src/python
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: true
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v6

      - name: wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P3306 --silent; do
            sleep 1
          done
      
      - name: load databases
        run: |
          mysql -h 127.0.0.1 -u root -e 'CREATE DATABASE ensembl_genome_metadata;'
          mysql -h 127.0.0.1 -u root ensembl_genome_metadata < tests/variation_utils/data/ensembl_genome_metadata.dump
          mysql -h 127.0.0.1 -u root -e 'CREATE DATABASE homo_sapiens_core_110_38;'
          mysql -h 127.0.0.1 -u root homo_sapiens_core_110_38 < tests/variation_utils/data/homo_sapiens_core_110_38.dump

      - name: setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: src/python/.python-version
      - name: setup Python dependencies
        run: |
          python3 -m pip install -e .
          python3 -m pip install pytest coverage
      - name: pytest
        run: |
          python3 -m coverage run -m pytest \
            tests/variation_utils/clients \
            tests/variation_utils/file_locator \
            tests/variation_utils/test_file_utils.py
      - name: Add coverage reports
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/py_coverage_comment.sh coverage.lcov

  nf-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextflow/
    steps:
      - uses: actions/checkout@v6
      - name: setup nf-test
        run: curl -fsSL https://code.askimed.com/install/nf-test | bash
      - name: Run the tests
        run: ./nf-test test vcf_prepper/tests
