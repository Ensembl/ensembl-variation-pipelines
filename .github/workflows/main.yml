name: nf-test
on: [push, pull_request]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup
        run: curl -fsSL https://get.nf-test.com | bash -s 0.9.2
      - name: test
        run: ${GITHUB_WORKSPACE}/nf-test test nextflow/vcf_prepper/tests
