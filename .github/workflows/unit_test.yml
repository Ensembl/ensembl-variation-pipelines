name: unit-test
on: [push, pull_request]

# relative to job working directory ${{ GITHUB_WORKSPACE }}/nextflow/vcf_prepper
env:
  PYTHON_SRC_DIR: ../../src/python
  ENSEMBL_ROOT_DIR: repos
  FTP_NFS_DIR: tests/testdata
  OLD_FTP_NFS_DIR: tests/testdata

jobs:
  vcf_prepper:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: nextflow/vcf_prepper
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Ensembl/ensembl-vep
          ref: main
          path: 'nextflow/vcf_prepper/repos/ensembl-vep'
      - uses: actions/checkout@v4
        with:
          repository: Ensembl/ensembl-variation
          ref: main
          path: 'nextflow/vcf_prepper/repos/ensembl-variation'
      - uses: actions/checkout@v4
        with:
          repository: Ensembl/VEP_plugins
          ref: main
          path: 'nextflow/vcf_prepper/repos/VEP_plugins'
      - uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'
      - uses: nf-core/setup-nextflow@v1
        with:
          version: '24.04.3'

      - name: wait for MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P3306 --silent; do
            sleep 1
          done

      - name: load databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e 'CREATE DATABASE ensembl_genome_metadata;'
          mysql -h 127.0.0.1 -u root -ppassword ensembl_genome_metadata < tests/testdata/ensembl_genome_metadata.dump
          mysql -h 127.0.0.1 -u root -ppassword -e 'CREATE DATABASE homo_sapiens_core_110_38;'
          mysql -h 127.0.0.1 -u root -ppassword homo_sapiens_core_110_38 < tests/testdata/homo_sapiens_core_110_38.dump

      - name: setup nf-test
        run: |
          wget -qO- https://get.nf-test.com | bash
          sudo mv nf-test /usr/local/bin/

      - name: setup Python dependencies
        run: |
          python3 -m pip install ${{ env.PYTHON_SRC_DIR }}
          python3 -m pip install -r requirements.txt

      - name: setup Perl dependencies
        run: |
          for lib_path in repos/ensembl*/lib repos/ensembl*/modules 
          do
            PERL5LIB=${lib_path}:$PERL5LIB
          done
          echo "PERL5LIB=$PERL5LIB" >> $GITHUB_ENV

      - name: test
        run: nf-test test tests --ci --profile github
