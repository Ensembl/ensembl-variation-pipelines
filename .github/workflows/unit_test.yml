name: unit-test
on: [push, pull_request]

env:
  PYTHON_SRC_DIR: src/python
  FTP_NFS_DIR:
  OLD_FTP_NFS_DIR:

jobs:
  vcf_prepper:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: nextflow/vcf_prepper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Ensembl/ensembl-vep
          ref: main
          path: 'nextflow/vcf_prepper/repos/ensembl-vep'
      - uses: actions/checkout@v4
        with:
          repository: Ensembl/ensembl-variation
          ref: main
          path: 'nextflow/vcf_prepper/repos/ensembl-variation'
      - uses: actions/checkout@v4
        with:
          repository: Ensembl/VEP_plugins
          ref: main
          path: 'nextflow/vcf_prepper/repos/VEP_plugins'
      - uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'
      - uses: nf-core/setup-nextflow@v1
        with:
          version: '24.04.3'

      - name: setup MySQL
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql database: 'test_db'
          mysql root password: 'password'

      - name: load databases
        run: |
          mysql -h 127.0.0.1 -u root -ppassword -e 'CREATE DATABASE ensembl_genome_metadata;'
          mysql -h 127.0.0.1 -u root -ppassword test_db < nextflow/vcf_prepper/tests/testdata/ensembl_genome_metadata.dump
          mysql -h 127.0.0.1 -u root -ppassword -e 'CREATE DATABASE homo_sapiens_core_110_38;'
          mysql -h 127.0.0.1 -u root -ppassword test_db < nextflow/vcf_prepper/tests/testdata/homo_sapiens_core_110_38.dump

      - name: setup nf-test and python dependencies
        run: |
          wget -qO- https://get.nf-test.com | bash
          sudo mv nf-test /usr/local/bin/
          python3 -m pip install ../../${{ env.PYTHON_SRC_DIR }}
          python3 -m pip install -r requirements.txt

      - name: test
        continue-on-error: true
        run: nf-test test tests --ci --profile github
